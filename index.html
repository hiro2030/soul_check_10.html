<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>魂度数測定 - 体験版</title>
    <style>
        /* デザインを前の「紫ベース」に統一 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #e9d5ff, #f3e8ff); color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 450px; }
        h1 { font-size: 1.6rem; color: #4b5563; margin-bottom: 30px; }
        /* ボタンの色を紫に！ */
        button { background: #7c3aed; color: white; border: none; padding: 15px; margin: 10px; border-radius: 12px; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.3s; box-shadow: 0 4px 6px rgba(124, 58, 237, 0.1); outline: none; }
        button:hover { background: #6d28d9; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(124, 58, 237, 0.2); }
        .hidden { display: none; }
        #progress { color: #9ca3af; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card" id="quiz">
        <div id="progress"></div>
        <h1 id="question">読み込み中...</h1>
        <div id="options"></div>
    </div>
    <div class="card hidden" id="result">
        <h1>体験版終了！</h1>
        <p style="font-size: 1.1rem; margin: 20px 0;">あなたの魂の輪郭が見えてきました…</p>
        <p style="font-size: 1.2rem; color: #7c3aed; font-weight: bold;">さらに深い「20問完全版」で<br>魂の真実を解き明かしませんか？</p>
        <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">※続きはNoteの有料エリアで公開中！</p>
    </div>

    <script>
        const questions = [
            { q: "朝、目覚めた瞬間の気分は？", a: ["最高に熱い", "穏やかな凪", "まだ眠い", "少し重い"] },
            { q: "直感を信じて行動することが多い？", a: ["常に直感", "たまに信じる", "論理的に考える", "あまりない"] },
            { q: "情熱の温度を数字にするなら？", a: ["1950度", "100度", "36.5度", "氷点下"] },
            { q: "今の自分は「本当の自分」だと思う？", a: ["100%自分", "だいたい自分", "模索中", "仮面を被っている"] },
            { q: "他人の感情に敏感な方だ？", a: ["かなり敏感", "普通", "鈍感な方", "全く気にしない"] }
        ];
        let currentIdx = 0;

        /* 【新機能】選択肢をランダムに並べ替える魔法（シャッフル関数） */
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQ() {
            if(currentIdx >= questions.length) {
                document.getElementById('quiz').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                return;
            }
            document.getElementById('progress').innerText = `STEP ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('question').innerText = questions[currentIdx].q;
            const opt = document.getElementById('options');
            opt.innerHTML = '';
            
            /* ここで選択肢をシャッフルしてからボタンを作る */
            const shuffledAnswers = shuffle([...questions[currentIdx].a]); 
            shuffledAnswers.forEach(ans => {
                const btn = document.createElement('button');
                btn.innerText = ans;
                btn.onclick = () => { currentIdx++; showQ(); };
                opt.appendChild(btn);
            });
        }
        showQ();
    </script>
</body>
</html>
