<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>魂度数測定 - 体験版</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background: #6200ee; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card" id="quiz">
        <h2>魂度数測定（体験版）</h2>
        <p id="question">読み込み中...</p>
        <div id="options"></div>
    </div>
    <div class="card hidden" id="result">
        <h2>5問終了！</h2>
        <p>あなたの魂の輪郭が見えてきました……</p>
        <p><strong>さらに深い「20問フル診断」で、あなたの魂の真実を解き明かしませんか？</strong></p>
        <p>※続きはNoteの有料エリアで公開中！</p>
    </div>

    <script>
        const questions = [
            { q: "朝、目覚めた瞬間の気分は？", a: ["最高に熱い", "穏やかな凪", "まだ眠い", "少し重い"] },
            { q: "直感を信じて行動することが多い？", a: ["常に直感", "たまに信じる", "論理的に考える", "あまりない"] },
            { q: "情熱の温度を数字にするなら？", a: ["1950度", "100度", "36.5度", "氷点下"] },
            { q: "今の自分は「本当の自分」だと思う？", a: ["100%自分", "だいたい自分", "模索中", "仮面を被っている"] },
            { q: "他人の感情に敏感な方だ？", a: ["かなり敏感", "普通", "鈍感な方", "全く気にしない"] }
        ];
        let currentIdx = 0;
        function showQ() {
            if(currentIdx >= questions.length) {
                document.getElementById('quiz').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                return;
            }
            const q = questions[currentIdx];
            document.getElementById('question').innerText = q.q;
            const opt = document.getElementById('options');
            opt.innerHTML = '';
            q.a.forEach(ans => {
                const btn = document.createElement('button');
                btn.innerText = ans;
                btn.onclick = () => { currentIdx++; showQ(); };
                opt.appendChild(btn);
            });
        }
        showQ();
    </script>
</body>
</html>
