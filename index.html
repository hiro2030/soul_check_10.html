<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>魂度数測定 - 体験版</title>
    <style>
        /* 背景を薄いブルーの清潔感ある色に */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f9ff; color: #334155; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 95%; max-width: 480px; }
        h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: 25px; line-height: 1.4; }
        /* ボタンも清潔感のあるブルー系に */
        button { background: #3b82f6; color: white; border: none; padding: 14px; margin: 8px 0; border-radius: 10px; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.2s; box-shadow: 0 2px 4px rgba(59, 130, 246, 0.1); outline: none; }
        button:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(59, 130, 246, 0.2); }
        .hidden { display: none; }
        #progress { color: #94a3b8; font-size: 0.85rem; margin-bottom: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="quiz">
        <div id="progress"></div>
        <h1 id="question">読み込み中...</h1>
        <div id="options"></div>
    </div>
    <div class="card hidden" id="result">
        <h1>体験版終了！</h1>
        <p style="font-size: 1.1rem; margin: 20px 0;">あなたの魂の輪郭が見えてきました…</p>
        <p style="font-size: 1.2rem; color: #3b82f6; font-weight: bold;">さらに深い「20問完全版」で<br>魂の真実を解き明かしませんか？</p>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 25px;">※続きはNoteの有料エリアで公開中！</p>
    </div>

    <script>
        const questions = [
            { q: "朝、目覚めた瞬間の気分は？", a: ["最高に熱い", "穏やかな凪", "まだ眠い", "少し重い", "ワクワクが止まらない"] },
            { q: "直感を信じて行動することが多い？", a: ["常に直感", "たまに信じる", "論理的に考える", "あまりない", "周りに合わせる"] },
            { q: "情熱の温度を数字にするなら？", a: ["1950度", "100度", "36.5度", "氷点下", "測定不能"] },
            { q: "今の自分は「本当の自分」だと思う？", a: ["100%自分", "だいたい自分", "模索中", "仮面を被っている", "変わりたい"] },
            { q: "他人の感情に敏感な方だ？", a: ["かなり敏感", "普通", "鈍感な方", "全く気にしない", "時と場合による"] }
        ];
        let currentIdx = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQ() {
            if(currentIdx >= questions.length) {
                document.getElementById('quiz').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                return;
            }
            document.getElementById('progress').innerText = `STEP ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('question').innerText = questions[currentIdx].q;
            const opt = document.getElementById('options');
            opt.innerHTML = '';
            
            const shuffledAnswers = shuffle([...questions[currentIdx].a]); 
            shuffledAnswers.forEach(ans => {
                const btn = document.createElement('button');
                btn.innerText = ans;
                btn.onclick = () => { currentIdx++; showQ(); };
                opt.appendChild(btn);
            });
        }
        showQ();
    </script>
</body>
</html>
