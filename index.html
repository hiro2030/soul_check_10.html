<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>魂度数測定 - 体験版</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: 50px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 1.5rem; }
        button { background: #6200ee; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 10px; width: 80%; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #4b00b0; transform: scale(1.02); }
        .hidden { display: none; }
        #progress { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card" id="quiz">
        <div id="progress"></div>
        <h1 id="question">読み込み中...</h1>
        <div id="options"></div>
    </div>
    <div class="card hidden" id="result">
        <h1>体験版終了！</h1>
        <p>あなたの魂の輪郭が見えてきました…</p>
        <p style="font-size: 1.2rem; color: #6200ee;"><strong>さらに深い「20問完全版」で<br>魂の真実を解き明かしませんか？</strong></p>
        <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">※続きはNoteの有料エリアで公開中！</p>
    </div>

    <script>
        const questions = [
            { q: "朝、目覚めた瞬間の気分は？", a: ["最高に熱い", "穏やかな凪", "まだ眠い", "少し重い"] },
            { q: "直感を信じて行動することが多い？", a: ["常に直感", "たまに信じる", "論理的に考える", "あまりない"] },
            { q: "情熱の温度を数字にするなら？", a: ["1950度", "100度", "36.5度", "氷点下"] },
            { q: "今の自分は「本当の自分」だと思う？", a: ["100%自分", "だいたい自分", "模索中", "仮面を被っている"] },
            { q: "他人の感情に敏感な方だ？", a: ["かなり敏感", "普通", "鈍感な方", "全く気にしない"] }
        ];
        let currentIdx = 0;
        function showQ() {
            if(currentIdx >= questions.length) {
                document.getElementById('quiz').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                return;
            }
            document.getElementById('progress').innerText = `質問 ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('question').innerText = questions[currentIdx].q;
            const opt = document.getElementById('options');
            opt.innerHTML = '';
            questions[currentIdx].a.forEach(ans => {
                const btn = document.createElement('button');
                btn.innerText = ans;
                btn.onclick = () => { currentIdx++; showQ(); };
                opt.appendChild(btn);
            });
        }
        showQ();
    </script>
</body>
</html>
